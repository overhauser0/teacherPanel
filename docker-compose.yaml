services:
  app:
    image: nginx:alpine
    ports:
      - '5499:80'
    volumes:
      - ./public:/usr/share/nginx/html:ro
    depends_on:
      - api

  api:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./api:/app
      - photos:/data/photos
    environment:
      PORT: '3000'
      DATABASE_URL: 'postgres://teacher_user:teacher_pass@db:5432/teacher_db'
      OWNER_ID: 'owner'
      OWNER_PASSWORD: '1TO1netz'
      SESSION_SECRET: 'dev-secret-change-me'
      PHOTO_DIR: '/data/photos'
      CORS_ORIGIN: 'https://teacherpanel.overhauser0.synology.me'
    command: sh -c "npm install && npm run dev"
    ports:
      - '5500:3000'
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: teacher_db
      POSTGRES_USER: teacher_user
      POSTGRES_PASSWORD: teacher_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./api/schema.sql:/schema.sql:ro
    ports:
      - '549:5432'

volumes:
  pgdata:
  photos:
