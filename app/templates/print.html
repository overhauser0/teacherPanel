<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>講師紹介カード - 印刷</title>
    <link
      rel="icon"
      type="image/png"
      href="{{ url_for('static', filename='favicon.png') }}"
    />
    <style>
      @media print {
        @page {
          size: A4 landscape;
          margin: 0;
        }
        .no-print {
          display: none;
        }
        .page-break {
          page-break-after: always;
        }
      }
      .print-canvas {
        width: 297mm;
        height: 210mm;
        padding: 20mm;
        background: white;
        display: flex;
        gap: 60px;
        box-sizing: border-box;
        align-items: flex-start;
      }
      .color-male {
        --accent: #2563eb;
        --accent-light: #eff6ff;
      }
      .color-female {
        --accent: #db2777;
        --accent-light: #fff1f2;
      }
    </style>
  </head>
  <body class="bg-gray-100">
    <div class="no-print p-4 text-center">
      <button
        onclick="window.print()"
        class="bg-gray-800 text-white px-8 py-2 rounded-full font-bold"
      >
        印刷プレビュー・PDF保存
      </button>
    </div>

    {% for t in teachers %}
    <div class="print-canvas mx-auto color-{{ t.gender }}">
      <div class="w-[40%] flex flex-col justify-between h-[170mm]">
        <div>
          <div
            class="w-full aspect-square rounded-[32px] overflow-hidden bg-gray-100"
          >
            {% if t.image_filename %}
            <img
              src="{{ url_for('static', filename='uploads/' + t.image_filename) }}"
              class="w-full h-full object-cover"
            />
            {% endif %}
          </div>
          <div class="mt-8 text-3xl font-bold font-sans" style="color:var(--accent);opacity:0.6">Name</div>
          <div class="mt-2 relative">
            <h1 class="text-6xl font-black text-gray-800 tracking-tight text-center">
              {{ t.name }}
            </h1>
            <div class="absolute -bottom-4 left-0 w-full h-4 overflow-hidden">
              <svg
                viewBox="0 0 100 20"
                preserveAspectRatio="none"
                class="w-full h-full"
                style="
                  stroke: var(--accent);
                  stroke-width: 4;
                  fill: none;
                  opacity: 0.6;
                "
              >
                <path d="M0 10 Q 12.5 0, 25 10 T 50 10 T 75 10 T 100 10" />
              </svg>
            </div>
          </div>
        </div>

        <div class="h-24 w-72 flex items-end">
          <img
            src="/static/logo.png"
            class="max-w-full max-h-full object-contain object-left"
          />
        </div>
      </div>

      <div class="w-[60%] flex flex-col justify-between h-[170mm] pt-4">
        <div class="mb-5 space-y-2">
          <div class="text-3xl font-bold font-sans" style="color:var(--accent);opacity:0.6">Profile</div>
          <div class="flex items-baseline gap-6 border-b border-gray-100 pb-4">
            <span
              class="text-xs font-bold tracking-widest text-gray-400 uppercase w-20"
              >出身県</span
            >
            <p class="text-3xl font-bold text-gray-700">{{ t.hometown }}</p>
          </div>
          <div class="flex items-baseline gap-6 border-b border-gray-100 pb-4">
            <span
              class="text-xs font-bold tracking-widest text-gray-400 uppercase w-20"
              >得意科目</span
            >
            <p class="text-3xl font-bold text-gray-700">{{ t.subject }}</p>
          </div>
        </div>

        <div
          class="relative p-10 rounded-[40px] min-h-[220px] flex-grow"
          style="background-color: var(--accent-light)"
        >
          <svg
            class="absolute top-6 left-6 w-14 h-14"
            style="fill: {{ '#cbd5e1' if t.gender == 'male' else '#ffb5be' }};"
            viewBox="0 0 24 24"
          >
            <path
              d="M14.017 21L14.017 18C14.017 16.895 14.912 16 16.017 16H19.017C20.122 16 21.017 16.895 21.017 18V21H14.017ZM3.017 21V18C3.017 16.895 3.912 16 5.017 16H8.017C9.122 16 10.016 16.895 10.016 18V21H3.017ZM14.017 14C14.017 11.131 15.222 8.628 17.152 6.883C17.657 6.425 18.448 6.46 18.906 6.965C19.364 7.47 19.329 8.261 18.824 8.719C17.51 9.904 16.817 11.455 16.712 13H19.017C20.122 13 21.017 13.895 21.017 15V18H14.017V14ZM3.017 14C3.017 11.131 4.222 8.628 6.152 6.883C6.657 6.425 7.448 6.46 7.896 6.965C8.354 7.47 8.319 8.261 7.814 8.719C6.5 9.904 5.807 11.455 5.702 13H8.017C9.122 13 10.016 13.895 10.016 15V18H3.017V14Z"
            />
          </svg>
          <p
            class="text-2xl leading-relaxed text-gray-700 font-light relative z-10"
            style="white-space: pre-wrap"
          >
            {{ t.comment }}
          </p>
        </div>
      </div>
    </div>
    <div class="page-break"></div>
    {% endfor %}
  </body>
</html>
