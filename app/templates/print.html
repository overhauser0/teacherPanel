<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @media print {
        @page {
          size: A4 landscape;
          margin: 0;
        }
        .no-print {
          display: none;
        }
        .page-break {
          page-break-after: always;
        }
      }
      .print-canvas {
        width: 297mm;
        height: 210mm;
        padding: 20mm;
        background: white;
        display: flex;
        gap: 60px;
        box-sizing: border-box;
        align-items: flex-start;
      }
      .color-male {
        --accent: #2563eb;
        --accent-light: #eff6ff;
      }
      .color-female {
        --accent: #db2777;
        --accent-light: #fff1f2;
      }
    </style>
  </head>
  <body class="bg-gray-100">
    <div class="no-print p-4 text-center">
      <button
        onclick="window.print()"
        class="bg-gray-800 text-white px-8 py-2 rounded-full font-bold"
      >
        印刷プレビュー・PDF保存
      </button>
    </div>

    {% for t in teachers %}
    <div class="print-canvas mx-auto color-{{ t.gender }}">
      <div class="w-[40%] flex flex-col">
        <div
          class="w-full aspect-square rounded-[32px] overflow-hidden bg-gray-100"
        >
          {% if t.image_filename %}
          <img
            src="{{ url_for('static', filename='uploads/' + t.image_filename) }}"
            class="w-full h-full object-cover"
          />
          {% else %}
          <div
            class="w-full h-full flex items-center justify-center text-gray-300 italic"
          >
            No Photo
          </div>
          {% endif %}
        </div>
        <div class="mt-8">
          <h1 class="text-6xl font-black text-gray-800 tracking-tight">
            {{ t.name }}
            <span class="text-2xl font-normal text-gray-400">先生</span>
          </h1>
        </div>
        <div class="mt-6 h-16 w-48">
          <img
            src="/static/logo.png"
            class="max-w-full max-h-full object-contain object-left"
          />
        </div>
      </div>

      <div class="w-[60%] flex flex-col pt-4">
        <div class="mb-10 space-y-4">
          <div class="flex items-baseline gap-6 border-b border-gray-100 pb-4">
            <span
              class="text-xs font-bold tracking-widest text-gray-400 uppercase w-20"
              >Hometown</span
            >
            <p class="text-3xl font-bold text-gray-700">{{ t.hometown }}</p>
          </div>
          <div class="flex items-baseline gap-6 border-b border-gray-100 pb-4">
            <span
              class="text-xs font-bold tracking-widest text-gray-400 uppercase w-20"
              >Subject</span
            >
            <p class="text-3xl font-bold text-gray-700">{{ t.subject }}</p>
          </div>
        </div>

        <div
          class="relative p-10 rounded-[40px] min-h-[220px]"
          style="background-color: var(--accent-light)"
        >
          <svg
            class="absolute top-6 left-6 w-12 h-12 opacity-10"
            style="fill: var(--accent)"
            viewBox="0 0 24 24"
          >
            <path
              d="M14.017 21L14.017 18C14.017 16.899 14.899 16 16.017 16H19.017C19.567 16 20.017 15.55 20.017 15V9C20.017 8.45 19.567 8 19.017 8H15.017C14.467 8 14.017 8.45 14.017 9V11C14.017 11.55 13.567 12 13.017 12H12.017V5H22.017V15C22.017 18.314 19.331 21 16.017 21H14.017ZM3.017 21L3.017 18C3.017 16.899 3.899 16 5.017 16H8.017C8.567 16 9.017 15.55 9.017 15V9C9.017 8.45 8.567 8 8.017 8H4.017C3.467 8 3.017 8.45 3.017 9V11C3.017 11.55 2.567 12 2.017 12H1.017V5H11.017V15C11.017 18.314 8.331 21 5.017 21H3.017Z"
            />
          </svg>
          <p
            class="text-2xl leading-relaxed text-gray-700 font-medium relative z-10 pt-4"
            style="white-space: pre-wrap"
          >
            {{ t.comment }}
          </p>
        </div>
      </div>
    </div>
    <div class="page-break"></div>
    {% endfor %}
  </body>
</html>
