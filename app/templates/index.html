<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>デザイン確認メニュー</title>
  </head>
  <body class="bg-orange-50 flex items-center justify-center h-screen">
    <div
      class="bg-white p-8 rounded-3xl shadow-xl border-4 border-orange-200 max-w-sm w-full"
    >
      <h1 class="text-2xl font-bold text-orange-600 mb-6 text-center">
        🎨 プロトタイプ確認用
      </h1>
      <div class="space-y-4">
        <a
          href="/"
          class="block w-full py-3 bg-white border-2 border-orange-300 text-orange-600 rounded-xl text-center font-bold hover:bg-orange-100 transition"
          >ログイン画面 (/)</a
        >
        <a
          href="/register"
          class="block w-full py-3 bg-orange-400 text-white rounded-xl text-center font-bold hover:bg-orange-500 shadow-md transition"
          >新規登録画面 (/register)</a
        >
        <a
          href="/admin"
          class="block w-full py-3 bg-white border-2 border-gray-300 text-gray-600 rounded-xl text-center font-bold hover:bg-gray-100 transition"
          >管理者一覧 (/admin)</a
        >
        <a
          href="/print"
          class="block w-full py-3 bg-indigo-500 text-white rounded-xl text-center font-bold hover:bg-indigo-600 shadow-md transition"
          >🖨️ 印刷プレビュー (/print)</a
        >
      </div>
      <p class="text-xs text-gray-400 mt-6 text-center">
        ※各画面の「戻る」ボタンは未実装です
      </p>
    </div>
  </body>
</html>
