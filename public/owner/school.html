<!doctype html>
<html lang="ja">
  <head>

    <title>教室編集（モック）</title>
    <link rel="stylesheet" href="/assets/style.css" />
  </head>
  <body>
    <div class="container">
      <div class="nav">
        <div class="left">
          <a href="/owner/schools.html">← 教室一覧へ</a>

        </div>
        <div class="right">

          <small>実装時：POST /owner/schools/:id</small>

          <form action="#" method="post" class="form-grid two">

              <label>教室ID</label>
              <input value="1" disabled />
            </div>
            <div>
              <label>教室名</label>
              <input value="広島本部校" />
            </div>
            <div class="row" style="grid-column: 1 / -1">
              <button class="btn primary" type="button">保存（未実装）</button>
              <a class="btn" href="/owner/schools.html">戻る</a>
            </div>
          </form>
        </div>
      </div>
    </div>
