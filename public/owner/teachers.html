<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>講師一覧（モック）</title>
    <link rel="stylesheet" href="/assets/style.css" />
  </head>
  <body>
    <div class="container">
      <div class="nav">
        <div class="left">
          <a href="/">← Top</a>
          <strong>オーナー：講師一覧</strong>
        </div>
        <div class="right">
          <a href="/owner/schools.html">教室マスタ</a>
          <a class="btn" href="/owner/login.html">ログアウト（モック）</a>
        </div>
      </div>

      <div class="grid">
        <div class="card">
          <h1>検索・絞り込み</h1>
          <div class="form-grid two">
            <div>
              <label>キーワード（氏名/ID）</label>
              <input placeholder="例：山田 / 001234" />
            </div>
            <div>
              <label>教室</label>
              <select>
                <option>すべて</option>
                <option>広島本部校</option>
                <option>横川校</option>
              </select>
            </div>
          </div>
          <div class="hr"></div>
          <div class="row">
            <a class="btn primary" href="/owner/teacher.html"
              >（サンプル）講師詳細へ</a
            >
            <button class="btn" type="button">検索（未実装）</button>
          </div>
        </div>

        <div class="card">
          <h1>講師一覧</h1>
          <table class="table">
            <thead>
              <tr>
                <th>講師ID</th>
                <th>氏名</th>
                <th>教室</th>
                <th>出身</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>001234</td>
                <td>山田 太郎</td>
                <td>広島本部校</td>
                <td>広島県</td>
                <td><a href="/owner/teacher.html">詳細</a></td>
              </tr>
              <tr>
                <td>009876</td>
                <td>佐藤 花子</td>
                <td>横川校</td>
                <td>岡山県</td>
                <td><a href="/owner/teacher.html">詳細</a></td>
              </tr>
            </tbody>
          </table>
          <div class="hr"></div>
          <small
            >※実装時：100名規模想定。ページング or
            無限スクロールは後で判断。</small
          >
        </div>
      </div>
    </div>
  </body>
</html>
