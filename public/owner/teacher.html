<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>１対１ネッツ講師紹介｜講師詳細</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="/assets/style.css" />
  </head>
  <body>
    <div class="container">
      <div class="nav">
        <div class="left">
          <a href="/owner/teachers.html">← 一覧へ</a>
          <strong>オーナー：講師詳細</strong>
        </div>
        <div class="right">
          <div class="icon-row" aria-label="mood icons">
            <svg class="icon" viewBox="0 0 24 24" role="img" aria-label="cloud">
              <path
                d="M7.5 18.5h9.3a4.2 4.2 0 0 0 .4-8.4A5.6 5.6 0 0 0 6.5 9.7a3.9 3.9 0 0 0 1 8.8Z"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
            <svg class="icon" viewBox="0 0 24 24" role="img" aria-label="book">
              <path
                d="M5.5 6.5c2.6-1.3 5.4-1.3 8 0v13c-2.6-1.3-5.4-1.3-8 0v-13Z"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linejoin="round"
              />
              <path
                d="M18.5 6.5c-2.6-1.3-5.4-1.3-8 0"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
              />
              <path
                d="M18.5 6.5v13c-2.6-1.3-5.4-1.3-8 0"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linejoin="round"
              />
            </svg>
          </div>
          <button class="btn ok" type="button" onclick="window.print()">
            印刷（A4）
          </button>
        </div>
      </div>

      <div class="grid two">
        <div class="card">
          <h1>
            <span class="hicon" aria-hidden="true"
              ><svg class="icon icon-inline" viewBox="0 0 24 24">
                <path
                  d="M4.5 19.5l4.2-1.1L19 8.1a2 2 0 0 0 0-2.8l-.3-.3a2 2 0 0 0-2.8 0L5.6 15.3 4.5 19.5Z"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linejoin="round"
                /></svg></span
            >基本情報（編集）
          </h1>
          <small>teacher_code（6桁）はオーナーが変更可能。</small>
          <div class="hr"></div>

          <form action="#" method="post" class="form-grid two">
            <div>
              <label>講師ID（6桁）</label>
              <input value="001234" maxlength="6" />
            </div>
            <div>
              <label>氏名</label>
              <input value="山田 太郎" />
            </div>
            <div>
              <label>教室</label>
              <select>
                <option>広島本部校</option>
                <option>横川校</option>
              </select>
            </div>
            <div>
              <label>出身県</label>
              <select>
                <option>広島県</option>
                <option>岡山県</option>
              </select>
            </div>
            <div style="grid-column: 1 / -1">
              <label>得意科目（暫定：カンマ区切り）</label>
              <input value="数学, 英語" />
            </div>
            <div style="grid-column: 1 / -1">
              <label>コメント</label>
              <textarea>
生徒が「できた」を積み上げられるように、毎回の授業で小さな達成を作ります。</textarea
              >
            </div>
            <div style="grid-column: 1 / -1">
              <label>写真</label>
              <input type="file" accept="image/*" />
            </div>
            <div class="row" style="grid-column: 1 / -1">
              <button class="btn primary" type="button">保存（未実装）</button>
              <button class="btn" type="button">PWリセット（未実装）</button>
              <button class="btn danger" type="button">削除（未実装）</button>
            </div>
          </form>
        </div>

        <div class="card">
          <h1>
            <span class="hicon" aria-hidden="true"
              ><svg class="icon icon-inline" viewBox="0 0 24 24">
                <path
                  d="M7 7.5h10M7 12h10M7 16.5h10"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                /></svg></span
            >A4プレビュー
          </h1>
          <small>実装時：このHTMLをPDF化（Playwright推奨）。</small>
          <div class="hr"></div>

          <div class="a4">
            <div
              class="row"
              style="justify-content: space-between; align-items: flex-start"
            >
              <div>
                <h1>講師プロフィール</h1>
                <div class="muted">講師ID：001234</div>
              </div>
              <div class="photo">PHOTO</div>
            </div>
            <div style="height: 10px"></div>
            <div class="kv">
              <div class="muted">氏名</div>
              <div>山田 太郎</div>
              <div class="muted">教室名</div>
              <div>広島本部校</div>
              <div class="muted">出身県</div>
              <div>広島県</div>
              <div class="muted">得意科目</div>
              <div>数学、英語</div>
            </div>
            <div style="height: 12px"></div>
            <div class="muted" style="font-weight: 700; margin-bottom: 6px">
              コメント
            </div>
            <div style="line-height: 1.7">
              生徒が「できた」を積み上げられるように、毎回の授業で小さな達成を作ります。<br />
              苦手の原因を一緒に分解して、最短ルートで伸ばします。
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
