<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>講師詳細（モック）</title>
    <link rel="stylesheet" href="/assets/style.css" />
  </head>
  <body>
    <div class="container">
      <div class="nav">
        <div class="left">
          <a href="/owner/teachers.html">← 一覧へ</a>
          <strong>オーナー：講師詳細</strong>
        </div>
        <div class="right">
          <button class="btn ok" onclick="window.print()">
            A4印刷（モック）
          </button>
        </div>
      </div>

      <div class="grid two">
        <div class="card">
          <h1>基本情報（編集）</h1>
          <small>teacher_code（6桁）はオーナーが変更可能。</small>
          <div class="hr"></div>

          <form action="#" method="post" class="form-grid two">
            <div>
              <label>講師ID（6桁）</label>
              <input value="001234" maxlength="6" />
            </div>
            <div>
              <label>氏名</label>
              <input value="山田 太郎" />
            </div>
            <div>
              <label>教室</label>
              <select>
                <option>広島本部校</option>
                <option>横川校</option>
              </select>
            </div>
            <div>
              <label>出身県</label>
              <select>
                <option>広島県</option>
                <option>岡山県</option>
              </select>
            </div>
            <div style="grid-column: 1 / -1">
              <label>得意科目（暫定：カンマ区切り）</label>
              <input value="数学, 英語" />
            </div>
            <div style="grid-column: 1 / -1">
              <label>コメント</label>
              <textarea>
生徒が「できた」を積み上げられるように、毎回の授業で小さな達成を作ります。</textarea
              >
            </div>
            <div style="grid-column: 1 / -1">
              <label>写真</label>
              <input type="file" accept="image/*" />
            </div>
            <div class="row" style="grid-column: 1 / -1">
              <button class="btn primary" type="button">保存（未実装）</button>
              <button class="btn" type="button">PWリセット（未実装）</button>
              <button class="btn danger" type="button">削除（未実装）</button>
            </div>
          </form>
        </div>

        <div class="card">
          <h1>A4プレビュー</h1>
          <small>実装時：このHTMLをPDF化（Playwright推奨）。</small>
          <div class="hr"></div>

          <div class="a4">
            <div
              class="row"
              style="justify-content: space-between; align-items: flex-start"
            >
              <div>
                <h1>講師プロフィール</h1>
                <div class="muted">講師ID：001234</div>
              </div>
              <div class="photo">PHOTO</div>
            </div>
            <div style="height: 10px"></div>
            <div class="kv">
              <div class="muted">氏名</div>
              <div>山田 太郎</div>
              <div class="muted">教室名</div>
              <div>広島本部校</div>
              <div class="muted">出身県</div>
              <div>広島県</div>
              <div class="muted">得意科目</div>
              <div>数学、英語</div>
            </div>
            <div style="height: 12px"></div>
            <div class="muted" style="font-weight: 700; margin-bottom: 6px">
              コメント
            </div>
            <div style="line-height: 1.7">
              生徒が「できた」を積み上げられるように、毎回の授業で小さな達成を作ります。<br />
              苦手の原因を一緒に分解して、最短ルートで伸ばします。
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
