<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>オーナーログイン（モック）</title>
    <link rel="stylesheet" href="/assets/style.css" />
  </head>
  <body>
    <div class="container">
      <div class="nav">
        <div class="left">
          <a href="/">← Top</a>
          <strong>オーナーログイン</strong>
        </div>
        <div class="right">
          <span class="badge">mock</span>
        </div>
      </div>

      <div class="grid">
        <div class="card">
          <h1>ログイン</h1>
          <small>成功した想定で一覧へ遷移するモックです。</small>
          <div class="hr"></div>

          <form
            action="/owner/teachers.html"
            method="get"
            class="form-grid two"
          >
            <div>
              <label>ユーザー名</label>
              <input placeholder="owner" />
            </div>
            <div>
              <label>パスワード</label>
              <input type="password" placeholder="******" />
            </div>
            <div class="row" style="grid-column: 1 / -1">
              <button class="btn primary" type="submit">
                ログイン（モック）
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
