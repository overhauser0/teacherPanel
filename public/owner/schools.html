<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>１対１ネッツ講師紹介｜教室マスタ</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="/assets/style.css" />
  </head>
  <body>
    <div class="container">
      <div class="nav">
        <div class="left">
          <a href="/owner/teachers.html">← 講師一覧へ</a>
          <strong>オーナー：教室マスタ</strong>
        </div>
        <div class="right">
          <div class="icon-row" aria-label="mood icons">
            <svg class="icon" viewBox="0 0 24 24" role="img" aria-label="cloud">
              <path
                d="M7.5 18.5h9.3a4.2 4.2 0 0 0 .4-8.4A5.6 5.6 0 0 0 6.5 9.7a3.9 3.9 0 0 0 1 8.8Z"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
            <svg class="icon" viewBox="0 0 24 24" role="img" aria-label="rain">
              <path
                d="M7.5 16.2h9.3a4.2 4.2 0 0 0 .4-8.4A5.6 5.6 0 0 0 6.5 7.4a3.9 3.9 0 0 0 1 8.8Z"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <path
                d="M9 19.2l-1 2M12 19.2l-1 2M15 19.2l-1 2"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
              />
            </svg>
            <svg class="icon" viewBox="0 0 24 24" role="img" aria-label="book">
              <path
                d="M5.5 6.5c2.6-1.3 5.4-1.3 8 0v13c-2.6-1.3-5.4-1.3-8 0v-13Z"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linejoin="round"
              />
              <path
                d="M18.5 6.5c-2.6-1.3-5.4-1.3-8 0"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
              />
              <path
                d="M18.5 6.5v13c-2.6-1.3-5.4-1.3-8 0"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linejoin="round"
              />
            </svg>
            <svg class="icon" viewBox="0 0 24 24" role="img" aria-label="game">
              <path
                d="M7.5 15.5h-2a3 3 0 0 1-2.9-3.7l.7-3.2A3 3 0 0 1 6.2 6.5h11.6a3 3 0 0 1 2.9 2.1l.7 3.2a3 3 0 0 1-2.9 3.7h-2l-2.2 2.2a1 1 0 0 1-1.4 0l-1-1-1 1a1 1 0 0 1-1.4 0L7.5 15.5Z"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linejoin="round"
              />
              <path
                d="M8 10.5h3M9.5 9v3"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
              />
              <path
                d="M16.6 10.2h.01M18 11.8h.01"
                fill="none"
                stroke="currentColor"
                stroke-width="2.4"
                stroke-linecap="round"
              />
            </svg>
          </div>
          <span class="badge">追加・編集の導線</span>
        </div>
      </div>

      <div class="grid two">
        <div class="card">
          <h1>
            <span class="hicon" aria-hidden="true"
              ><svg class="icon icon-inline" viewBox="0 0 24 24">
                <path
                  d="M12 5v14M5 12h14"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                /></svg></span
            >教室を追加
          </h1>
          <small>実装時：POST /owner/schools</small>
          <div class="hr"></div>

          <form action="#" method="post" class="form-grid">
            <div>
              <label>教室名</label>
              <input placeholder="例：広島本部校" />
            </div>
            <div class="row">
              <button class="btn primary" type="button">追加（未実装）</button>
            </div>
          </form>
        </div>

        <div class="card">
          <h1>
            <span class="hicon" aria-hidden="true"
              ><svg class="icon icon-inline" viewBox="0 0 24 24">
                <path
                  d="M7 7.5h10M7 12h10M7 16.5h10"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                /></svg></span
            >教室一覧
          </h1>
          <table class="table">
            <thead>
              <tr>
                <th>ID</th>
                <th>教室名</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>1</td>
                <td>広島本部校</td>
                <td>
                  <a href="/owner/school.html">編集</a>
                  <span class="muted"> / </span>
                  <a href="#" onclick="alert('削除は未実装')">削除</a>
                </td>
              </tr>
              <tr>
                <td>2</td>
                <td>横川校</td>
                <td>
                  <a href="/owner/school.html">編集</a>
                  <span class="muted"> / </span>
                  <a href="#" onclick="alert('削除は未実装')">削除</a>
                </td>
              </tr>
            </tbody>
          </table>
          <div class="hr"></div>
          <small
            >※実装時：教室に紐づく講師がいる場合、削除可否ルールが必要。</small
          >
        </div>
      </div>
    </div>
  </body>
</html>
