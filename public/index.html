<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>１対１ネッツ講師紹介</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="/assets/style.css" />
  </head>
  <body>
    <div class="container">
      <div class="nav">
        <div class="left">
          <strong>１対１ネッツ講師紹介</strong>
          <span class="badge">Mock</span>
        </div>
        <div class="right">
          <div class="icon-row" aria-label="mood icons">
            <svg class="icon" viewBox="0 0 24 24" role="img" aria-label="cloud">
              <path
                d="M7.5 18.5h9.3a4.2 4.2 0 0 0 .4-8.4A5.6 5.6 0 0 0 6.5 9.7a3.9 3.9 0 0 0 1 8.8Z"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
            <svg class="icon" viewBox="0 0 24 24" role="img" aria-label="rain">
              <path
                d="M7.5 16.2h9.3a4.2 4.2 0 0 0 .4-8.4A5.6 5.6 0 0 0 6.5 7.4a3.9 3.9 0 0 0 1 8.8Z"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <path
                d="M9 19.2l-1 2M12 19.2l-1 2M15 19.2l-1 2"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
              />
            </svg>
            <svg class="icon" viewBox="0 0 24 24" role="img" aria-label="book">
              <path
                d="M5.5 6.5c2.6-1.3 5.4-1.3 8 0v13c-2.6-1.3-5.4-1.3-8 0v-13Z"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linejoin="round"
              />
              <path
                d="M18.5 6.5c-2.6-1.3-5.4-1.3-8 0"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
              />
              <path
                d="M18.5 6.5v13c-2.6-1.3-5.4-1.3-8 0"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linejoin="round"
              />
            </svg>
            <svg class="icon" viewBox="0 0 24 24" role="img" aria-label="game">
              <path
                d="M7.5 15.5h-2a3 3 0 0 1-2.9-3.7l.7-3.2A3 3 0 0 1 6.2 6.5h11.6a3 3 0 0 1 2.9 2.1l.7 3.2a3 3 0 0 1-2.9 3.7h-2l-2.2 2.2a1 1 0 0 1-1.4 0l-1-1-1 1a1 1 0 0 1-1.4 0L7.5 15.5Z"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linejoin="round"
              />
              <path
                d="M8 10.5h3M9.5 9v3"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
              />
              <path
                d="M16.6 10.2h.01M18 11.8h.01"
                fill="none"
                stroke="currentColor"
                stroke-width="2.4"
                stroke-linecap="round"
              />
            </svg>
          </div>
          <span class="badge">共通ログイン</span>
        </div>
      </div>

      <div class="grid">
        <div class="card">
          <h1>
            <span class="hicon" aria-hidden="true"
              ><svg class="icon icon-inline" viewBox="0 0 24 24">
                <path
                  d="M7.5 10.5V8.8a4.5 4.5 0 0 1 9 0v1.7"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                />
                <path
                  d="M7 10.5h10a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2v-6a2 2 0 0 1 2-2Z"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linejoin="round"
                /></svg></span
            >ID/PW入力
          </h1>
          <small
            >モック：owner/1TO1netz
            のときオーナーTOP、それ以外は講師編集へ。</small
          >
          <div class="hr"></div>

          <form id="loginForm" class="form-grid two">
            <div>
              <label>ID</label>
              <input id="loginId" placeholder="例：001234 / owner" />
            </div>
            <div>
              <label>パスワード</label>
              <input id="loginPw" type="password" placeholder="******" />
            </div>
            <div class="row" style="grid-column: 1 / -1">
              <button class="btn primary" type="submit">
                ログイン（モック）
              </button>
            </div>
          </form>

          <div class="hr"></div>
          <small
            >実装時：ここでID/PWを照合し、ロール（owner/teacher）でリダイレクト。</small
          >
        </div>
      </div>
    </div>

    <script>
      document
        .getElementById('loginForm')
        .addEventListener('submit', async (e) => {
          e.preventDefault();
          const id = document.getElementById('loginId').value.trim();
          const pw = document.getElementById('loginPw').value;

          const r = await fetch('/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({ id, password: pw }),
          });

          if (!r.ok) {
            alert('ID/PWが違います');
            return;
          }
          const data = await r.json();
          location.href = data.redirect;
        });
    </script>
  </body>
</html>
