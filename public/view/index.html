<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ID/PW入力（モック）</title>
    <link rel="stylesheet" href="/assets/style.css" />
  </head>
  <body>
    <div class="container">
      <div class="nav">
        <div class="left">
          <a href="/">← Top</a>
          <strong>ID/PW入力</strong>
        </div>
        <div class="right">
          <span class="badge">teacher_code: 6桁（先頭0可）</span>
        </div>
      </div>

      <div class="grid">
        <div class="card">
          <h1>本人確認</h1>
          <small
            >成功した想定で「プロフィール表示」へ遷移するモックです。</small
          >
          <div class="hr"></div>

          <form action="/me/" method="get" class="form-grid two">
            <div>
              <label>講師ID（6桁）</label>
              <input
                name="teacher_code"
                inputmode="numeric"
                placeholder="例：001234"
                maxlength="6"
              />
            </div>
            <div>
              <label>パスワード</label>
              <input name="password" type="password" placeholder="******" />
            </div>
            <div class="row" style="grid-column: 1 / -1">
              <button class="btn primary" type="submit">
                ログイン（モック）
              </button>
              <a class="btn" href="/me/edit.html">編集へ（直リンク）</a>
            </div>
          </form>

          <div class="hr"></div>
          <small
            >※実装時：失敗回数制限、エラーメッセージの統一、セッション化。</small
          >
        </div>
      </div>
    </div>
  </body>
</html>
