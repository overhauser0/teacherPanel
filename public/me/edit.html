<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>１対１ネッツ講師紹介｜プロフィール編集</title>

    <!-- Google Fonts (rounded JP) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="/assets/style.css" />
  </head>
  <body>
    <div class="container">
      <div class="nav">
        <div class="left">
          <a href="/">← Top</a>
          <strong>プロフィール編集</strong>
        </div>
        <div class="right">
          <div class="icon-row" aria-label="mood icons">
            <svg class="icon" viewBox="0 0 24 24" role="img" aria-label="cloud">
              <path
                d="M7.5 18.5h9.3a4.2 4.2 0 0 0 .4-8.4A5.6 5.6 0 0 0 6.5 9.7a3.9 3.9 0 0 0 1 8.8Z"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
            <svg class="icon" viewBox="0 0 24 24" role="img" aria-label="rain">
              <path
                d="M7.5 16.2h9.3a4.2 4.2 0 0 0 .4-8.4A5.6 5.6 0 0 0 6.5 7.4a3.9 3.9 0 0 0 1 8.8Z"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <path
                d="M9 19.2l-1 2M12 19.2l-1 2M15 19.2l-1 2"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
              />
            </svg>
            <svg class="icon" viewBox="0 0 24 24" role="img" aria-label="book">
              <path
                d="M5.5 6.5c2.6-1.3 5.4-1.3 8 0v13c-2.6-1.3-5.4-1.3-8 0v-13Z"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linejoin="round"
              />
              <path
                d="M18.5 6.5c-2.6-1.3-5.4-1.3-8 0"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
              />
              <path
                d="M18.5 6.5v13c-2.6-1.3-5.4-1.3-8 0"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linejoin="round"
              />
            </svg>
            <svg class="icon" viewBox="0 0 24 24" role="img" aria-label="game">
              <path
                d="M7.5 15.5h-2a3 3 0 0 1-2.9-3.7l.7-3.2A3 3 0 0 1 6.2 6.5h11.6a3 3 0 0 1 2.9 2.1l.7 3.2a3 3 0 0 1-2.9 3.7h-2l-2.2 2.2a1 1 0 0 1-1.4 0l-1-1-1 1a1 1 0 0 1-1.4 0L7.5 15.5Z"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linejoin="round"
              />
              <path
                d="M8 10.5h3M9.5 9v3"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
              />
              <path
                d="M16.6 10.2h.01M18 11.8h.01"
                fill="none"
                stroke="currentColor"
                stroke-width="2.4"
                stroke-linecap="round"
              />
            </svg>
          </div>
          <span class="badge">保存は未実装</span>
        </div>
      </div>

      <div class="grid">
        <div class="card">
          <h1>
            <span class="hicon" aria-hidden="true"
              ><svg class="icon icon-inline" viewBox="0 0 24 24">
                <path
                  d="M7.5 10.5V8.8a4.5 4.5 0 0 1 9 0v1.7"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                />
                <path
                  d="M7 10.5h10a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2v-6a2 2 0 0 1 2-2Z"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linejoin="round"
                />
                <path
                  d="M12 14.5v2.4"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                /></svg></span
            >本人確認（この画面に統合）
          </h1>
          <small>実装時：ここでID/PWを照合してから編集を有効化。</small>
          <div class="hr"></div>

          <div class="form-grid two">
            <div>
              <label>講師ID（6桁）</label>
              <input
                name="teacher_code"
                inputmode="numeric"
                placeholder="例：001234"
                maxlength="6"
              />
            </div>
            <div>
              <label>パスワード</label>
              <input name="password" type="password" placeholder="******" />
            </div>
          </div>
        </div>

        <div class="card">
          <h1>
            <span class="hicon" aria-hidden="true"
              ><svg class="icon icon-inline" viewBox="0 0 24 24">
                <path
                  d="M4.5 19.5l4.2-1.1L19 8.1a2 2 0 0 0 0-2.8l-.3-.3a2 2 0 0 0-2.8 0L5.6 15.3 4.5 19.5Z"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linejoin="round"
                />
                <path
                  d="M13.2 6.7l4.1 4.1"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                /></svg></span
            >編集フォーム
          </h1>
          <small>後で `POST /me/edit` に差し替える想定のモック。</small>
          <div class="hr"></div>

          <form action="#" method="post" class="form-grid two">
            <div>
              <label>氏名</label>
              <input name="name" value="山田 太郎" />
            </div>
            <div>
              <label>出身県</label>
              <select name="prefecture">
                <option>広島県</option>
                <option>岡山県</option>
                <option>山口県</option>
                <option>島根県</option>
              </select>
            </div>

            <div>
              <label>教室名（選択式）</label>
              <select name="school">
                <option>広島本部校</option>
                <option>横川校</option>
                <option>五日市校</option>
              </select>
            </div>

            <div>
              <label>得意科目（暫定：カンマ区切り）</label>
              <input name="subjects" value="数学, 英語" />
            </div>

            <div style="grid-column: 1 / -1">
              <label>コメント</label>
              <textarea name="comment">
生徒が「できた」を積み上げられるように、毎回の授業で小さな達成を作ります。</textarea
              >
            </div>

            <div style="grid-column: 1 / -1">
              <label>写真（アップロード）</label>
              <input type="file" name="photo" accept="image/*" />
              <small>※実装時：Docker volume（/data/photos）に保存。</small>
            </div>

            <div class="row" style="grid-column: 1 / -1">
              <button class="btn primary" type="button">保存（未実装）</button>
              <a class="btn" href="/">戻る</a>
            </div>
          </form>

          <div class="hr"></div>
          <small
            >※実装時：本人確認が通るまで編集フォームは disabled
            にする（UI挙動は後で調整）。</small
          >
        </div>
      </div>
    </div>
  </body>
  <script>
    const API = 'http://localhost:5500';

    async function loadSchools() {
      const r = await fetch(`${API}/schools`, { credentials: 'include' });
      if (!r.ok) return;
      const schools = await r.json();

      const sel = document.querySelector('select[name="school"]');
      // 既存optionをクリア
      sel.innerHTML = '';
      sel.insertAdjacentHTML('beforeend', `<option value="">未設定</option>`);
      for (const s of schools) {
        sel.insertAdjacentHTML(
          'beforeend',
          `<option value="${s.id}">${s.name}</option>`,
        );
      }
    }

    async function loadMe() {
      const r = await fetch(`${API}/me`, { credentials: 'include' });
      if (!r.ok) return;
      const me = await r.json();

      document.querySelector('input[name="name"]').value = me.name ?? '';
      document.querySelector('select[name="prefecture"]').value =
        me.prefecture ?? '';
      document.querySelector('input[name="subjects"]').value =
        me.subjects ?? '';
      document.querySelector('textarea[name="comment"]').value =
        me.comment ?? '';

      const sel = document.querySelector('select[name="school"]');
      if (me.school_id) sel.value = String(me.school_id);
    }

    document.getElementById('saveBtn').addEventListener('click', async () => {
      const payload = {
        name: document.querySelector('input[name="name"]').value,
        prefecture: document.querySelector('select[name="prefecture"]').value,
        school_id:
          document.querySelector('select[name="school"]').value || null,
        subjects: document.querySelector('input[name="subjects"]').value,
        comment: document.querySelector('textarea[name="comment"]').value,
      };

      const r = await fetch(`${API}/me`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify(payload),
      });

      if (!r.ok) {
        alert('保存に失敗しました');
        return;
      }
      alert('保存しました');
    });

    (async () => {
      await loadSchools();
      await loadMe();
    })();
  </script>
</html>
